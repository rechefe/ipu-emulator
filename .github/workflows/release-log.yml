name: Release Log

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  update-release-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so the commit message can reference context
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate release log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python docs/update_release_log.py --latest

      - name: Commit and push updated release log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/release-log.md
          # Only commit if there is a diff
          git diff --cached --quiet || git commit -m "docs: update release log [skip ci]"
          git push
