site_name: IPU Emulator
site_description: Documentation for IPU emulator and assembly language
site_author: IPU Development Team
# Markdown lives under content/ (MkDocs requires docs_dir to be a subdirectory of the project).
docs_dir: content
repo_url: https://github.com/rechefe/ipu-emulator
repo_name: rechefe/ipu-emulator
edit_uri: edit/master/docs/

hooks:
  - hooks/giscus_env.py
  - hooks/history_link.py

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true

theme:
  name: material
  custom_dir: overrides
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - toc.integrate
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Setup: setup.md
      - Debugging: debugging.md
  - Programming the IPU:
      - Building Applications: building-applications.md
      - IPU Configuration: ipu-configuration.md
      - Wide-vector debug mode: wide-vector-debug-mode.md
  - Contributing:
      - Adding Instructions: adding-instruction.md
  - Assembly:
      - Assembly Syntax: assembly-syntax.md
      - Operand types: operand-types.md
      - Instruction Reference: instructions.md
      - Programmer's Guide: programmer-guide.md
  - Specs:
      - Cache Unit Specification: specs/cache-unit.md
      - AAQ Stage Specification: specs/stage-aaq.md
      - Control Stage Specification: specs/stage-control.md
      - RISC-V Host Integration: specs/riscv-host-integration.md
      - IPU Host Register Map: specs/ipu-host-registers.md
  - Release Log: release-log.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

extra:
  docs_git_branch: master
  # giscus: set repo_id + category_id from https://giscus.app (Discussions must be on).
  # CI: add repository secrets GISCUS_REPO_ID and GISCUS_CATEGORY_ID (optional: GISCUS_CATEGORY, …).
  # Local: export the same env vars before `mkdocs build` or `bazel build //docs:build_docs`.
  giscus:
    repo: rechefe/ipu-emulator
    repo_id: ""
    category: Announcements
    category_id: ""
    mapping: pathname
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: bottom
    theme: preferred_color_scheme
    lang: en
    strict: "0"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rechefe/ipu-emulator
  generator: false
