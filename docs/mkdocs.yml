site_name: IPU Emulator
site_description: Documentation for IPU emulator and assembly language
site_author: IPU Development Team
# Markdown and mkdocs.yml live in the same directory (local dev and Bazel build tree).
docs_dir: .
# Keep tooling and theme overrides out of the published site tree.
exclude_docs: |
  hooks/
  overrides/
  BUILD.bazel
  *.py
  mkdocs.yml
repo_url: https://github.com/rechefe/ipu-emulator
repo_name: rechefe/ipu-emulator
edit_uri: edit/master/docs/

hooks:
  - hooks/history_link.py

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true

theme:
  name: material
  custom_dir: overrides
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - toc.integrate
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Setup: setup.md
      - Debugging: debugging.md
  - Programming the IPU:
      - Building Applications: building-applications.md
      - Wide-vector debug mode: wide-vector-debug-mode.md
  - Contributing:
      - Adding Instructions: adding-instruction.md
  - Assembly:
      - Assembly Syntax: assembly-syntax.md
      - Instruction Reference: instructions.md
  - Specs:
      - Cache Unit Specification: specs/cache-unit.md
      - IPU Specification: specs/stage-aaq.md
  - Release Log: release-log.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

extra:
  docs_git_branch: master
  # Inline comments via GitHub Discussions (https://giscus.app). Enable Discussions on the
  # repo, run the giscus setup wizard, then paste repo_id and category_id below.
  giscus:
    repo: rechefe/ipu-emulator
    repo_id: ""
    category: Announcements
    category_id: ""
    mapping: pathname
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: bottom
    theme: preferred_color_scheme
    lang: en
    strict: "0"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rechefe/ipu-emulator
  generator: false
